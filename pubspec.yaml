name: heroos
description: 'HeroOS - Gamified Life Tracker (RPG-style)'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Backend & Auth
  supabase_flutter: ^2.5.0
  # Navigation
  go_router: ^14.0.0
  # State management
  provider: ^6.1.2
  # Typography
  google_fonts: ^6.2.1
  equatable: ^2.0.8
  intl: ^0.20.2
  table_calendar: ^3.2.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2
  http: ^1.2.0
  shared_preferences: ^2.3.0
  web: ^1.0.0  # promote from transitive to direct dependency; used for JS interop in InstallBanner

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
